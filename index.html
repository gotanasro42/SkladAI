async function dbLoad(){
  try{
    const [supRes,ordRes,snapRes,curRes]=await Promise.all([
      db.from('suppliers').select('*').order('name'),
      db.from('orders').select('*').order('created_at',{ascending:false}),
      db.from('snapshots').select('*').order('date',{ascending:false}).limit(60),
      db.from('current_products').select('*').order('sync_date',{ascending:false}).limit(1),
    ]);
    if(supRes.error)throw supRes.error;
    S.dbOk=true;
    if(supRes.data.length===0){
      // Prvé spustenie — nahraj defaultných dodávateľov
      const {error}=await db.from('suppliers').insert(DEFAULT_SUPS);
      if(!error)S.suppliers=DEFAULT_SUPS.map((s,i)=>({...s,id:i+1}));
    } else {
      S.suppliers=supRes.data;
    }
    S.ordered=(ordRes.data||[]).map(o=>({...o,arrived:o.arrived||false}));
    S.snapshots=snapRes.data||[];
    if(curRes.data&&curRes.data.length>0){
      S.products=curRes.data[0].products||[];
      S.lastSync=curRes.data[0].sync_date;
      S.tab='dashboard';
    }
  }catch(e){
    console.error(e);
    S.dbOk=false;
    S.alert={t:'e',msg:`Chyba pripojenia k databáze: ${e.message}. Skontroluj internetové pripojenie.`};
  }
}

async function parseFile(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});const ws=wb.Sheets[wb.SheetNames[0]];res(XLSX.utils.sheet_to_json(ws,{raw:false,defval:''}));}catch(err){rej(err);}};
    r.onerror=rej;r.readAsArrayBuffer(file);
  });
}

// Filter predajov: typPohybu.vydej kde Činnosť nie je prázdna.
// Inventúrne pohyby (vydej BEZ Činnosti) sú automaticky vylúčené.
// Overené na súbore inventúra 2025: 100% inventúrnych pohybov má prázdnu Činnosť.
// Sezónnosť je zabudovaná z roku 2025 (jan–dec, 313 902 pohybov).
function compute(sklR,pohR,magR,sups){
  const now=Date.now(),ms14=now-14*864e5,ms45=now-45*864e5,ms90=now-90*864e5;
  const sk={};
  for(const r of sklR){const sku=r['Cenník']||'';if(!sku)continue;sk[sku]={name:r['Názov']||'',stock:+r['Stav zásob v MJ']||0,price:+r['Priem. cena']||0,mj:r['MJ']||'',skupina:r['Skupina tovarov']||''};}
  const sal={};
  let filteredIn=0,filteredOut=0;
  for(const r of pohR){
    if(!(r['Typ pohybu']||'').includes('vydej'))continue;
    // Vylúč inventúrne pohyby: majú prázdnu Činnosť
    const cinnost=(r['Činnosť']||'').toString().trim();
    if(!cinnost){filteredOut++;continue;}
    filteredIn++;
    const sku=r['Kód z cenníka']||'';if(!sku)continue;
    const qty=+r['Množstvo']||0,val=+r['Celkom [€]']||0;
    const ds=r['Dátum vyst.'];const dt=ds instanceof Date?ds.getTime():new Date(ds).getTime();
    if(!sal[sku])sal[sku]={q14:0,q45:0,q90:0,v14:0,v45:0,v90:0};
    if(dt>=ms14){sal[sku].q14+=qty;sal[sku].v14+=val;}
    if(dt>=ms45){sal[sku].q45+=qty;sal[sku].v45+=val;}
    if(dt>=ms90){sal[sku].q90+=qty;sal[sku].v90+=val;}
  }
  const mag={};
  for(const r of magR){const sku=r['SKU']||'';if(!sku)continue;mag[sku]={obj:r['Objednanie']||'',sup:resolveSupplier((r['Dodávateľ']||r['Dodavatel']||'').trim()),email:r['Email']||''};}
  const supMap={};for(const s of sups)supMap[(s.name||'').toLowerCase().trim()]=s;
  const sf=seasonalFactor45();
  const products=[];
  for(const sku of Object.keys(sk)){
    const s=sk[sku],sa=sal[sku]||{q14:0,q45:0,q90:0,v14:0,v45:0,v90:0},m=mag[sku]||{};
    if(m.obj==='neobjednavame')continue;
    const d14=sa.q14/14,d45=sa.q45/45,d90=sa.q90/90;
    const daysLeft=d45>0?s.stock/d45:(s.stock>0?9999:0);
    const targetDays=S.orderMonths*30;
    const orderQty=Math.max((d45*sf*targetDays)-s.stock,0);
    let trend='—',tCls='tfl';
    if(d90>0.01){const p=(d14-d90)/d90*100;if(p>10){trend=`+${p.toFixed(0)}%`;tCls='tup';}else if(p<-10){trend=`${p.toFixed(0)}%`;tCls='tdn';}else trend=`${p>0?'+':''}${p.toFixed(0)}%`;}
    else if(d14>0.01){trend='nový';tCls='tup';}
    let status;
    if(s.stock<=0&&d45>0.02)status='vypadok';
    else if(daysLeft<7&&d45>0)status='urgentne';
    else if(daysLeft<14&&d45>0)status='kriticke';
    else if(daysLeft<30&&d45>0)status='varovanie';
    else if(d45===0&&s.stock>0)status='nepredava';
    else status='ok';
    if(!['vypadok','urgentne','kriticke','varovanie'].includes(status))continue;
    const supI=supMap[(m.sup||'').toLowerCase().trim()]||null;
    const leadDays=(supI?+supI.lead_days:0)||0;
    const email=m.email||(supI?supI.email:'')||'';
    const toolate=leadDays>0&&daysLeft!==9999&&daysLeft<leadDays&&s.stock>0;
    const sfPct=Math.round((sf-1)*100);
    products.push({sku,name:s.name,mj:s.mj,stock:Math.round(s.stock*100)/100,price:s.price,
      d14:+d14.toFixed(2),d45:+d45.toFixed(2),d90:+d90.toFixed(2),
      v14:+sa.v14.toFixed(2),v45:+sa.v45.toFixed(2),v90:+sa.v90.toFixed(2),
      daysLeft:daysLeft>=9999?null:+daysLeft.toFixed(1),
      orderQty:+orderQty.toFixed(2),orderVal:+(orderQty*s.price).toFixed(2),
      sfPct,trend,tCls,status,obj:m.obj||'nenastavené',
      dodavatel:m.sup||'',leadDays,email,lang:supI?supI.lang:'SK',
      subject:supI?supI.subject:'Objednávka',rolky:supI?supI.rolky:'Nie',toolate});
  }
  return {products,filteredOut};
}

async function processAll(){
  S.processing=true;S.progress=5;S.pmsg='Načítavam stav skladu...';render();
  try{
    const sklR=await parseFile(S.files.sklad);S.progress=22;S.pmsg='Načítavam pohyby (môže trvať 20–30 sek)...';render();
    const pohR=await parseFile(S.files.pohyby);S.progress=60;S.pmsg='Načítavam Magento export...';render();
    const magR=await parseFile(S.files.mag);S.progress=78;S.pmsg='Vyhodnocujem...';render();
    const {products,filteredOut}=compute(sklR,pohR,magR,S.suppliers);
    const date=today();
    const stats={vypadok:products.filter(p=>p.status==='vypadok').length,urgentne:products.filter(p=>p.status==='urgentne').length,kriticke:products.filter(p=>p.status==='kriticke').length,varovanie:products.filter(p=>p.status==='varovanie').length,neskoro:products.filter(p=>p.toolate).length};
    S.progress=88;S.pmsg='Ukladám do databázy...';render();
    await Promise.all([dbSaveSnapshot({date,stats}),dbSaveProducts(date,products)]);
    S.snapshots=S.snapshots.filter(s=>s.date!==date);
    S.snapshots.unshift({date,stats});
    S.products=products;S.lastSync=date;S.progress=100;
    const sfPct=Math.round((seasonalFactor45()-1)*100);
    S.processing=false;
    S.alert={t:'ok',msg:`Hotovo! ${sklR.length.toLocaleString()} produktov, ${pohR.length.toLocaleString()} pohybov. Vylúčených inventúrnych: ${filteredOut}. Kritických: ${stats.vypadok+stats.urgentne+stats.kriticke}. Sezónny koef.: ${sfPct>0?'+':''}${sfPct}%. Uložené do databázy.`};
    S.tab='dashboard';
  }catch(err){S.processing=false;S.alert={t:'e',msg:'Chyba: '+err.message};console.error(err);}
  render();
}

function getFiltered(){
  let p=S.products;
  if(S.filter==='neskoro')p=p.filter(x=>x.toolate);
  else if(S.filter!=='all')p=p.filter(x=>x.status===S.filter);
  if(S.supFil!=='all')p=p.filter(x=>x.dodavatel===S.supFil);
  if(S.search){const q=S.search.toLowerCase();p=p.filter(x=>x.sku.toLowerCase().includes(q)||x.name.toLowerCase().includes(q)||(x.dodavatel||'').toLowerCase().includes(q));}
  return [...p].sort((a,b)=>{const c=S.sortCol;let av=a[c]??99999,bv=b[c]??99999;return typeof av==='string'?S.sortDir*av.localeCompare(bv):S.sortDir*(av-bv);});
}
function isOrd(sku){return S.ordered.some(o=>o.sku===sku&&!o.arrived);}

function dz(id,label,sub,file){
  return `<label for="dz-${id}" class="dz${file?' has':''}"><input type="file" id="dz-${id}" accept=".xlsx,.xls" style="display:none" data-dz="${id}">
<div class="di">${file?'✓':'+'}</div><div class="dl">${label}</div><div class="ds">${file?esc(file.name):sub}</div></label>`;
}

function ordHtml(){
  const active=S.ordered.filter(o=>!o.arrived);const done=S.ordered.filter(o=>o.arrived);
  return `<div class="panel"><div class="ptitle">Otvorené objednávky (${active.length})</div>
${active.length?active.map(o=>`<div class="or"><div class="oi"><div class="on2">${esc(o.name)} <span class="tag">${esc(o.sku)}</span>${o.lang?` <span class="lbadge l${(o.lang||'').toLowerCase()}">${o.lang}</span>`:''}</div><div class="om">${o.qty} ${o.mj} · ${esc(o.supplier||'—')} · Objednané: ${o.ordered_at||o.orderedAt}${o.deliver_by||o.deliverBy?' → '+(o.deliver_by||o.deliverBy):''}${o.note?' · '+esc(o.note):''}</div></div><button class="bo" data-arrived="${esc(o.id)}">Prišlo ✓</button><button class="dbtn" data-delord="${esc(o.id)}">Zrušiť</button></div>`).join(''):`<div class="empty">Žiadne otvorené objednávky.</div>`}
</div>
${done.length?`<div class="panel"><div class="ptitle" style="color:#888;font-size:13px">Doručené (${done.length})</div>${done.slice(0,50).map(o=>`<div class="or" style="opacity:.5"><div class="oi"><div class="on2">${esc(o.name)}</div><div class="om">${o.qty} ${o.mj} · ${esc(o.supplier||'—')}${(o.arrived_at||o.arrivedAt)?' · Doručené: '+(o.arrived_at||o.arrivedAt):''}</div></div></div>`).join('')}</div>`:''}`;
}

function supHtml(){
  const q2=S.supSearch.toLowerCase();
  const vis=q2?S.suppliers.filter(s=>s.name.toLowerCase().includes(q2)||(s.email||'').toLowerCase().includes(q2)):S.suppliers;
  return `<div class="panel">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem"><div class="ptitle" style="margin:0">Dodávatelia (${S.suppliers.length})</div><button class="ibtn" id="add-sup-btn">+ Pridať</button></div>
<input type="text" id="sup-search" placeholder="Hľadať dodávateľa..." value="${esc(S.supSearch)}" style="font-size:12px;padding:6px 10px;width:100%;margin-bottom:.8rem">
${S.addSup?`<div style="background:#F9F9F9;border:1px solid #E5E5E5;border-radius:8px;padding:1rem;margin-bottom:.8rem"><div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px"><div class="fg"><label>Názov</label><input id="ns-name" type="text" value="${esc(S.newSup.name)}" style="font-size:13px;padding:6px 9px;"></div><div class="fg"><label>Email</label><input id="ns-email" type="email" value="${esc(S.newSup.email)}" style="font-size:13px;padding:6px 9px;"></div><div class="fg"><label>Dodacia doba (dni)</label><input id="ns-lead" type="number" value="${S.newSup.lead_days}" style="font-size:13px;padding:6px 9px;"></div><div class="fg"><label>Jazyk</label><select id="ns-lang" style="font-size:13px;padding:6px 9px;"><option${S.newSup.lang==='SK'?' selected':''}>SK</option><option${S.newSup.lang==='PL'?' selected':''}>PL</option><option${S.newSup.lang==='EN'?' selected':''}>EN</option></select></div></div><div style="display:flex;gap:8px"><button id="save-sup" style="font-size:13px;padding:6px 16px;background:#1D9E75;color:white;border:none;border-radius:6px;cursor:pointer">Uložiť do DB</button><button id="cancel-sup" style="font-size:13px;padding:6px 16px;border:1px solid #D0D0D0;background:transparent;border-radius:6px;cursor:pointer">Zrušiť</button></div></div>`:''}
<div style="font-size:10px;color:#AAA;margin-bottom:7px">Klikni na číslo doby dodania pre rýchlu úpravu. Všetky zmeny sa okamžite ukladajú do databázy.</div>
${vis.slice(0,80).map(s=>{const ri=s.id;const ed=S.editLeadId===ri;return `<div class="sr"><div style="font-weight:600;min-width:170px;font-size:12px">${esc(s.name)}</div><div style="color:#666;flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.email||'—')}</div>${ed?`<input class="lead-inp" id="lead-inp-${ri}" type="number" value="${S.editLeadVal}"><button data-savelead="${ri}" style="font-size:11px;padding:3px 8px;border-radius:5px;border:none;background:#1D9E75;color:white;cursor:pointer">OK</button><button data-cancellead="${ri}" class="dbtn">×</button>`:`<span data-editlead="${ri}" style="font-size:12px;font-weight:600;cursor:pointer;min-width:40px;text-align:center;padding:3px 7px;border-radius:5px;border:1px solid #D0D0D0;" title="Klikni pre úpravu">${s.lead_days}d</span>`}<span class="lbadge l${(s.lang||'sk').toLowerCase()}">${s.lang||'SK'}</span><button class="dbtn" data-delsup="${ri}">Odstrániť</button></div>`;}).join('')}
${vis.length>80?`<div style="font-size:11px;color:#AAA;padding:8px 0">+${vis.length-80} ďalších. Použi vyhľadávanie.</div>`:''}
</div>`;
}

function histHtml(){
  if(!S.snapshots.length)return `<div class="empty">História sa začne tvoriť po prvom nahraní dát.<br>Ukladá sa do Supabase databázy — zostane navždy.</div>`;
  return `<div class="panel"><div class="ptitle">História denných prehľadov (${S.snapshots.length} záznamov)</div>
${S.snapshots.map((s,i)=>{
  const d=s.stats||{};const tot=(d.vypadok||0)+(d.urgentne||0)+(d.kriticke||0)+(d.varovanie||0);
  const prev=i<S.snapshots.length-1?S.snapshots[i+1].stats:null;
  const diff=prev?(tot-((prev.vypadok||0)+(prev.urgentne||0)+(prev.kriticke||0)+(prev.varovanie||0))):null;
  return `<div class="hr"><div class="hd">${s.date}</div><div class="hn"><span class="sb sv">V:${d.vypadok||0}</span><span class="sb su">U:${d.urgentne||0}</span><span class="sb sk2">K:${d.kriticke||0}</span><span class="sb sw">Var:${d.varovanie||0}</span>${d.neskoro?`<span class="sb snt">N:${d.neskoro}</span>`:''}</div><div style="font-size:11px;color:#888;margin-left:auto">Spolu: <strong>${tot}</strong>${diff!==null?` <span style="color:${diff>0?'#A32D2D':'#0F6E56'};font-weight:600">${diff>0?'+':''}${diff}</span>`:''}</div></div>`;
}).join('')}</div>`;
}

function bindAll(){
  const q=s=>document.querySelector(s);const qa=s=>document.querySelectorAll(s);
  qa('[data-tab]').forEach(el=>el.addEventListener('click',()=>{S.tab=el.dataset.tab;S.alert=null;render();}));
  qa('[data-fil]').forEach(el=>el.addEventListener('click',()=>{S.filter=el.dataset.fil;render();}));
  qa('[data-sort]').forEach(el=>el.addEventListener('click',()=>{const c=el.dataset.sort;if(S.sortCol===c)S.sortDir*=-1;else{S.sortCol=c;S.sortDir=1;}render();}));
  qa('[data-dz]').forEach(el=>el.addEventListener('change',e=>{const f=e.target.files[0];if(f)S.files[el.dataset.dz]=f;render();}));
  qa('[data-months]').forEach(el=>el.addEventListener('click',()=>{S.orderMonths=+el.dataset.months;render();}));
  const si=q('#srch');if(si)si.addEventListener('input',e=>{S.search=e.target.value;render();});
  const sf2=q('#supfil');if(sf2)sf2.addEventListener('change',e=>{S.supFil=e.target.value;render();});
  const pb=q('#proc-btn');if(pb)pb.addEventListener('click',()=>{if(!S.processing)processAll();});
  const alx=q('#al-x');if(alx)alx.addEventListener('click',()=>{S.alert=null;render();});
  qa('[data-order]').forEach(el=>el.addEventListener('click',()=>{
    const sku=el.dataset.order;if(isOrd(sku)){S.alert={t:'i',msg:'Produkt je už objednaný.'};render();return;}
    S.confirmSku=sku;S.cQty='';S.cDate='';S.cNote='';render();
    q('.cpanel')?.scrollIntoView({behavior:'smooth',block:'nearest'});
  }));
  const cfok=q('#cf-ok');
  if(cfok)cfok.addEventListener('click',async()=>{
    const p=S.products.find(x=>x.sku===S.confirmSku);if(!p)return;
    const qty=q('#cf-qty')?.value||p.orderQty;
    const deliver_by=q('#cf-date')?.value||null;
    const note=q('#cf-note')?.value||'';
    const ord={id:Date.now().toString(),sku:p.sku,name:p.name,mj:p.mj,qty,supplier:p.dodavatel,email:p.email,lang:p.lang,ordered_at:today(),deliver_by:deliver_by||null,note,arrived:false,arrived_at:null};
    await dbSaveOrder(ord);
    S.ordered.unshift(ord);
    S.confirmSku=null;S.alert={t:'ok',msg:`Objednávka uložená: "${p.name}"`};render();
  });
  const cfca=q('#cf-cancel');if(cfca)cfca.addEventListener('click',()=>{S.confirmSku=null;render();});
  qa('[data-arrived]').forEach(el=>el.addEventListener('click',async()=>{
    const id=el.dataset.arrived;const o=S.ordered.find(x=>x.id===id);
    if(o){o.arrived=true;o.arrived_at=today();await dbUpdateOrder(id,{arrived:true,arrived_at:today()});}render();
  }));
  qa('[data-delord]').forEach(el=>el.addEventListener('click',async()=>{
    const id=el.dataset.delord;await dbDeleteOrder(id);S.ordered=S.ordered.filter(x=>x.id!==id);render();
  }));
  const ss3=q('#sup-search');if(ss3)ss3.addEventListener('input',e=>{S.supSearch=e.target.value;render();});
  const asb=q('#add-sup-btn');if(asb)asb.addEventListener('click',()=>{S.addSup=!S.addSup;render();});
  const svs=q('#save-sup');
  if(svs)svs.addEventListener('click',async()=>{
    const name=q('#ns-name')?.value?.trim();if(!name){S.alert={t:'e',msg:'Zadaj názov.'};render();return;}
    const newSup={name,email:q('#ns-email')?.value||'',lead_days:+q('#ns-lead')?.value||14,lang:q('#ns-lang')?.value||'SK',subject:'Objednávka',rolky:'Nie'};
    const saved=await dbSaveSupplier(newSup);
    if(saved){S.suppliers.push(saved);}else{S.suppliers.push({...newSup,id:Date.now()});}
    S.addSup=false;S.newSup={name:'',email:'',lead_days:'',lang:'SK'};
    S.alert={t:'ok',msg:`"${name}" uložený do databázy.`};render();
  });
  const csu=q('#cancel-sup');if(csu)csu.addEventListener('click',()=>{S.addSup=false;render();});
  qa('[data-delsup]').forEach(el=>el.addEventListener('click',async()=>{
    const id=+el.dataset.delsup;if(!confirm('Naozaj odstrániť?'))return;
    await dbDeleteSupplier(id);S.suppliers=S.suppliers.filter(s=>s.id!==id);render();
  }));
  qa('[data-editlead]').forEach(el=>el.addEventListener('click',()=>{
    const id=+el.dataset.editlead;S.editLeadId=id;
    const s=S.suppliers.find(x=>x.id===id);S.editLeadVal=s?s.lead_days:14;render();
    setTimeout(()=>document.getElementById('lead-inp-'+id)?.focus(),50);
  }));
  qa('[data-savelead]').forEach(el=>el.addEventListener('click',async()=>{
    const id=+el.dataset.savelead;const v=parseInt(document.getElementById('lead-inp-'+id)?.value)||14;
    const s=S.suppliers.find(x=>x.id===id);if(s)s.lead_days=v;
    await dbUpdateLeadDays(id,v);S.editLeadId=null;
    S.alert={t:'ok',msg:`Dodacia doba uložená: ${v} dní`};render();
  }));
  qa('[data-cancellead]').forEach(el=>el.addEventListener('click',()=>{S.editLeadId=null;render();}));
  ['ns-name','ns-email','ns-lead'].forEach(id=>{const el=q('#'+id);if(el)el.addEventListener('input',e=>{const k=id.replace('ns-','');S.newSup[k]=e.target.value;});});
  const nl=q('#ns-lang');if(nl)nl.addEventListener('change',e=>{S.newSup.lang=e.target.value;});
}

// ── Štart ─────────────────────────────────────────────────────
async function init(){
  await dbLoad();
  render();
}
init();
</script>
