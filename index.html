async function parseFile(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});const ws=wb.Sheets[wb.SheetNames[0]];res(XLSX.utils.sheet_to_json(ws,{raw:false,defval:''}));}catch(err){rej(err);}};
    r.onerror=rej;r.readAsArrayBuffer(file);
  });
}

// Robustné čítanie stĺpca
function normalize(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();}
function col(row,candidates){
  // 1. Exact match
  for(const c of (Array.isArray(candidates)?candidates:[candidates])){
    if(row[c]!==undefined&&row[c]!==null&&row[c]!=='')return row[c];
  }
  // 2. Normalized match (strip diacritics + lowercase)
  const keys=Object.keys(row);
  for(const c of (Array.isArray(candidates)?candidates:[candidates])){
    const nc=normalize(c);
    const k=keys.find(k=>normalize(k)===nc);
    if(k&&row[k]!==undefined&&row[k]!==null&&row[k]!=='')return row[k];
  }
  // 3. Contains match
  for(const c of (Array.isArray(candidates)?candidates:[candidates])){
    const nc=normalize(c);
    const k=keys.find(k=>normalize(k).includes(nc));
    if(k&&row[k]!==undefined&&row[k]!==null&&row[k]!=='')return row[k];
  }
  return undefined;
}
function num(row,candidates){const v=col(row,candidates);return v===undefined||v===null||v===''?0:parseFloat(String(v).replace(',','.'))||0;}

// Vylúčenie inventúry: vydej BEZ Činnosti = inventúrny pohyb (overené na 100% vzorke)
function compute(sklR,pohR,magR,sups,sal2025ext){
  const now=Date.now(),ms14=now-14*864e5,ms45=now-45*864e5,ms90=now-90*864e5;
  const sk={};
  for(const r of sklR){const sku=col(r,['Cenník','cennik','Cennk'])||'';if(!sku)continue;const sg=(r['Skupina tovarov']||'').toString().trim().toUpperCase();
    const typ=sg==='VYROBOK'?'Výrobok':sg==='MATERIAL'||sg==='POUZITY_MATERIAL'?'Materiál':'Tovar';
    // Hľadaj stav zásob pod rôznymi názvami stĺpcov
    const stockVal=num(r,['Stav zásob v MJ','Stav zásob v MJ s požiadavkami','Stav zasob v MJ','stav zasob v mj','Stav']);
    const priceVal=num(r,['Priem. cena','Priem cena','Priemerna cena','priem. cena']);
    const nazov=col(r,['Názov','Nazov','Name','nazov'])||'';
    const mj=col(r,['MJ','Merna jednotka','Merná jednotka'])||'';
    sk[sku]={name:nazov,stock:stockVal,price:priceVal,mj,skupina:sg,typ};}

  const sal={},invSkipped=[];
  for(const r of pohR){
    const typPoh=(col(r,['Typ pohybu','typ pohybu'])||'').toString();
    if(!typPoh.includes('vydej'))continue;
    const cinnost=(col(r,['Činnosť','cinnost','Cinnost'])||'').toString().trim();
    if(!cinnost){invSkipped.push(r);continue;}
    const sku=col(r,['Kód z cenníka','kod z cennika','cennik'])||'';if(!sku)continue;
    const qty=num(r,['Množstvo','mnozstvo']),val=num(r,['Celkom','celkom']);
    const dsRaw=col(r,['Dátum vyst','datum vyst','Dátum']);
    const ds=dsRaw instanceof Date?dsRaw:dsRaw;const dt=ds instanceof Date?ds.getTime():new Date(ds).getTime();
    if(!sal[sku])sal[sku]={q14:0,q45:0,q90:0,v14:0,v45:0,v90:0};
    if(dt>=ms14){sal[sku].q14+=qty;sal[sku].v14+=val;}
    if(dt>=ms45){sal[sku].q45+=qty;sal[sku].v45+=val;}
    if(dt>=ms90){sal[sku].q90+=qty;sal[sku].v90+=val;}
  }

  // Minuloročné dáta — používame predpočítaný objekt (z DB alebo čerstvo spracovaný)
  const sal2025=sal2025ext||{};

  const mag={};
  for(const r of magR){
    const sku=col(r,['SKU','sku'])||'';if(!sku)continue;
    const magTyp=(col(r,['Typ produktu','typ produktu','Typ'])||'').toString().trim();
    const obj=col(r,['Objednanie','objednanie'])||'';
    const sup=resolveSupplier((col(r,['Dodávateľ','Dodavatel','dodavatel'])||'').trim());
    const email=col(r,['Email','email'])||'';
    mag[sku]={obj,sup,email,magTyp};}
  const supMap={};for(const s of sups)supMap[(s.name||'').toLowerCase().trim()]=s;

  // ABC klasifikácia — zorad podľa v45, top 20% = A, 50% = B, zvyšok = C
  const allV45=Object.values(sal).map(s=>s.v45).sort((a,b)=>b-a);
  const totalV45=allV45.reduce((s,v)=>s+v,0);
  const abcThreshA=totalV45*0.7,abcThreshB=totalV45*0.95;
  let cumV=0;const abcMap={};
  for(const[sku,sa] of Object.entries(sal).sort((a,b)=>b[1].v45-a[1].v45)){
    cumV+=sa.v45;
    abcMap[sku]=cumV<=abcThreshA?'A':cumV<=abcThreshB?'B':'C';
  }

  const products=[];
  for(const sku of Object.keys(sk)){
    const s=sk[sku],sa=sal[sku]||{q14:0,q45:0,q90:0,v14:0,v45:0,v90:0},m=mag[sku]||{};
    if(m.obj==='neobjednavame')continue;
    const d14=sa.q14/14,d45=sa.q45/45,d90=sa.q90/90;
    const dPY=sal2025[sku]||null; // priemer minulý rok rovnaké obdobie
    const daysLeft=d45>0?s.stock/d45:(s.stock>0?9999:0);

    let trend='—',tCls='tfl',tTip='Nie dostatok dát na trend.';
    if(d90>0.01){
      const p=(d14-d90)/d90*100;
      tTip=`Trend: predaj/deň za 14 dní (${d14.toFixed(2)}) vs priemer za 90 dní (${d90.toFixed(2)}). Zmena: ${p>0?'+':''}${p.toFixed(0)}%.`;
      if(p>10){trend=`+${p.toFixed(0)}%`;tCls='tup';}
      else if(p<-10){trend=`${p.toFixed(0)}%`;tCls='tdn';}
      else{trend=`${p>0?'+':''}${p.toFixed(0)}%`;}
    }else if(d14>0.01){trend='nový';tCls='tup';tTip='Nový produkt — menej ako 90 dní predaja.';}

    let status;
    if(s.stock<=0&&d45>0.02)status='vypadok';
    else if(daysLeft<7&&d45>0)status='urgentne';
    else if(daysLeft<14&&d45>0)status='kriticke';
    else if(daysLeft<30&&d45>0)status='varovanie';
    else if(d45===0&&s.stock>0)status='nepredava';
    else status='ok';
    // Zobrazujeme všetky produkty — filter sa aplikuje v getFiltered()

    const supI=supMap[(m.sup||'').toLowerCase().trim()]||null;
    const leadDays=(supI?+supI.lead_days:0)||0;
    const email=m.email||(supI?supI.email:'')||'';
    const toolate=leadDays>0&&daysLeft!==9999&&daysLeft<leadDays&&s.stock>0;
    const abc=abcMap[sku]||'C';
    products.push({sku,name:s.name,mj:s.mj,stock:Math.round(s.stock*100)/100,price:s.price,
      d14:+d14.toFixed(2),d45:+d45.toFixed(2),d90:+d90.toFixed(2),dPY,
      v14:+sa.v14.toFixed(2),v45:+sa.v45.toFixed(2),v90:+sa.v90.toFixed(2),
      daysLeft:daysLeft>=9999?null:+daysLeft.toFixed(1),
      status,obj:m.obj||'nenastavené',typ:m.magTyp||s.typ||'Tovar',
      dodavatel:m.sup||'',leadDays,email,lang:supI?supI.lang:'SK',
      subject:supI?supI.subject:'Objednávka',rolky:supI?supI.rolky:'Nie',
      toolate,trend,tCls,tTip,abc});
  }
  return{products,invSkipped:invSkipped.length};
}

function orderQtyFor(p,months){
  const days=months*30;
  const sf=seasonalFactor(days);
  return Math.max((p.d45*sf*days)-p.stock,0).toFixed(2);
}

async function processAll(){
  S.processing=true;S.progress=5;S.pmsg='Načítavam stav skladu...';render();
  try{
    const sklR=await parseFile(S.files.sklad);
    // Debug: log prvý riadok stavu skladu do konzoly
    if(sklR.length>0){console.log('Stav skladu — stĺpce:',Object.keys(sklR[0]));console.log('Prvý produkt:',sklR[0]);}
    S.progress=22;S.pmsg='Načítavam pohyby (20–30 sek)...';render();
    const pohR=await parseFile(S.files.pohyby);S.progress=55;S.pmsg='Načítavam Magento export...';render();
    const magR=await parseFile(S.files.mag);S.progress=72;
    // Pohyby 2025 — spracuj ak nahrané, inak použi uložené v DB
    let sal2025=S.sal2025||{};
    if(S.files.hist){
      S.pmsg='Načítavam pohyby 2025 a ukladám do DB...';render();
      const pohR2025=await parseFile(S.files.hist);
      // Vypočítaj sal2025 objekt
      const yr=new Date();yr.setFullYear(yr.getFullYear()-1);
      const lo=yr.getTime()-15*864e5,hi=yr.getTime()+15*864e5;
      const sal2025new={};
      for(const r of pohR2025){
        if(!(col(r,['Typ pohybu'])||'').includes('vydej'))continue;
        if(!(col(r,['Činnosť','cinnost'])||'').toString().trim())continue;
        const dsRaw2=col(r,['Dátum vyst','datum']);
        const dt=dsRaw2 instanceof Date?dsRaw2.getTime():new Date(dsRaw2).getTime();
        if(dt<lo||dt>hi)continue;
        const sku=col(r,['Kód z cenníka','cennik'])||'';if(!sku)continue;
        const qty=num(r,['Množstvo','mnozstvo']);
        if(!sal2025new[sku])sal2025new[sku]=0;
        sal2025new[sku]+=qty;
      }
      for(const sku of Object.keys(sal2025new))sal2025new[sku]=+(sal2025new[sku]/30).toFixed(2);
      sal2025=sal2025new;
      S.sal2025=sal2025;
      S.has2025=true;
      await dbSaveHist2025(sal2025);
    }
    S.pmsg='Vyhodnocujem...';render();
    const{products,invSkipped}=compute(sklR,pohR,magR,S.suppliers,sal2025);
    S.progress=88;S.pmsg='Ukladám do databázy...';render();
    const date=today();
    const stats={vypadok:products.filter(p=>p.status==='vypadok').length,urgentne:products.filter(p=>p.status==='urgentne').length,kriticke:products.filter(p=>p.status==='kriticke').length,varovanie:products.filter(p=>p.status==='varovanie').length,neskoro:products.filter(p=>p.toolate).length};
    await Promise.all([dbSaveSnapshot({date,stats}),dbSaveProducts(date,products)]);
    S.snapshots=S.snapshots.filter(s=>s.date!==date);S.snapshots.unshift({date,stats});
    S.products=products;S.lastSync=date;S.progress=100;S.processing=false;
    const sfPct=Math.round((seasonalFactor(Math.round(S.orderMonths*30))-1)*100);
    S.alert={t:'ok',msg:`Hotovo! Produkty: ${sklR.length.toLocaleString()}, pohyby: ${pohR.length.toLocaleString()}, vylúčených inventúrnych: ${invSkipped}. Kritických: ${stats.vypadok+stats.urgentne+stats.kriticke}. Sezónny koef.: ${sfPct>0?'+':''}${sfPct}%.`};
    S.tab='dashboard';
  }catch(err){S.processing=false;S.alert={t:'e',msg:'Chyba: '+err.message};console.error(err);}
  render();
}

function getFiltered(){
  let p=S.products;
  // Ak nie je aktívny žiadny filter okrem "všetky" — ukaž len kritické (default)
  const anyFilterActive=S.filter!=='all'||S.typFil!=='all'||S.objFil!=='all'||S.abcFil!=='all'||!!S.search||S.supFil!=='all';
  if(!anyFilterActive){
    p=p.filter(x=>['vypadok','urgentne','kriticke','varovanie'].includes(x.status));
  } else {
    // Aplikuj vybrané filtre
    if(S.filter==='neskoro') p=p.filter(x=>x.toolate);
    else if(S.filter!=='all') p=p.filter(x=>x.status===S.filter);
    if(S.typFil!=='all')  p=p.filter(x=>(x.typ||'Tovar')===S.typFil);
    if(S.objFil!=='all')  p=p.filter(x=>x.obj===S.objFil);
    if(S.abcFil!=='all')  p=p.filter(x=>x.abc===S.abcFil);
    if(S.supFil!=='all')  p=p.filter(x=>x.dodavatel===S.supFil);
    if(S.search){const q=S.search.toLowerCase();p=p.filter(x=>x.sku.toLowerCase().includes(q)||x.name.toLowerCase().includes(q)||(x.dodavatel||'').toLowerCase().includes(q));}
  }
  return[...p].sort((a,b)=>{const col=S.sortCol;let av=a[col]??99999,bv=b[col]??99999;return typeof av==='string'?S.sortDir*av.localeCompare(bv):S.sortDir*(av-bv);});
}

function bindAll(){
  const q=s=>document.querySelector(s),qa=s=>document.querySelectorAll(s);
  qa('[data-tab]').forEach(el=>el.addEventListener('click',()=>{S.tab=el.dataset.tab;S.alert=null;render();}));
  qa('[data-fil]').forEach(el=>el.addEventListener('click',()=>{S.filter=el.dataset.fil;render();}));
  qa('[data-typ]').forEach(el=>el.addEventListener('click',()=>{
    S.typFil=el.dataset.typ;
    // Keď vyberieš typ, resetni status filter aby si videl všetky daného typu
    if(S.typFil!=='all') S.filter='all';
    render();
  }));
  qa('[data-obj]').forEach(el=>el.addEventListener('click',()=>{S.objFil=S.objFil===el.dataset.obj?'all':el.dataset.obj;render();}));
  qa('[data-abc]').forEach(el=>el.addEventListener('click',()=>{S.abcFil=S.abcFil===el.dataset.abc?'all':el.dataset.abc;render();}));
  qa('[data-months]').forEach(el=>el.addEventListener('click',()=>{S.orderMonths=+el.dataset.months;render();}));
  qa('[data-sort]').forEach(el=>el.addEventListener('click',()=>{const c=el.dataset.sort;S.sortCol===c?S.sortDir*=-1:(S.sortCol=c,S.sortDir=1);render();}));
  qa('[data-dz]').forEach(el=>el.addEventListener('change',e=>{const f=e.target.files[0];if(f)S.files[el.dataset.dz]=f;render();}));
  qa('[data-rowm]').forEach(el=>el.addEventListener('change',e=>{S.rowMonths[el.dataset.rowm]=+e.target.value||S.orderMonths;render();}));
  const si=q('#srch');if(si)si.addEventListener('input',e=>{S.search=e.target.value;render();});
  const sf2=q('#supfil');if(sf2)sf2.addEventListener('change',e=>{S.supFil=e.target.value;render();});
  const pb=q('#proc-btn');if(pb)pb.addEventListener('click',()=>{if(!S.processing)processAll();});
  const alx=q('#al-x');if(alx)alx.addEventListener('click',()=>{S.alert=null;render();});
  qa('[data-order]').forEach(el=>el.addEventListener('click',()=>{
    const sku=el.dataset.order;
    if(isOrd(sku)){S.alert={t:'i',msg:'Produkt je už objednaný.'};render();return;}
    S.confirmSku=sku;S.cQty='';S.cDate='';S.cNote='';render();
    q('.cpanel')?.scrollIntoView({behavior:'smooth',block:'nearest'});
  }));
  const cfok=q('#cf-ok');
  if(cfok)cfok.addEventListener('click',async()=>{
    const p=S.products.find(x=>x.sku===S.confirmSku);if(!p)return;
    const qty=q('#cf-qty')?.value||'',deliver_by=q('#cf-date')?.value||null,note=q('#cf-note')?.value||'';
    const ord={id:Date.now().toString(),sku:p.sku,name:p.name,mj:p.mj,qty,supplier:p.dodavatel,email:p.email,lang:p.lang,ordered_at:today(),deliver_by:deliver_by||null,note,arrived:false,arrived_at:null};
    await dbSaveOrder(ord);S.ordered.unshift(ord);
    S.confirmSku=null;S.alert={t:'ok',msg:`Objednávka uložená: "${p.name}"`};render();
  });
  const cfca=q('#cf-cancel');if(cfca)cfca.addEventListener('click',()=>{S.confirmSku=null;render();});
  qa('[data-arrived]').forEach(el=>el.addEventListener('click',async()=>{
    const id=el.dataset.arrived,o=S.ordered.find(x=>x.id===id);
    if(o){o.arrived=true;o.arrived_at=today();await dbUpdateOrder(id,{arrived:true,arrived_at:today()});}render();
  }));
  qa('[data-delord]').forEach(el=>el.addEventListener('click',async()=>{
    const id=el.dataset.delord;await dbDeleteOrder(id);S.ordered=S.ordered.filter(x=>x.id!==id);render();
  }));
  const ss3=q('#sup-search');if(ss3)ss3.addEventListener('input',e=>{S.supSearch=e.target.value;render();});
  const asb=q('#add-sup-btn');if(asb)asb.addEventListener('click',()=>{S.addSup=!S.addSup;render();});
  const svs=q('#save-sup');
  if(svs)svs.addEventListener('click',async()=>{
    const name=q('#ns-name')?.value?.trim();if(!name){S.alert={t:'e',msg:'Zadaj názov.'};render();return;}
    const ns={name,email:q('#ns-email')?.value||'',lead_days:+q('#ns-lead')?.value||14,lang:q('#ns-lang')?.value||'SK',subject:'Objednávka',rolky:'Nie'};
    const saved=await dbSaveSupplier(ns);
    S.suppliers.push(saved||{...ns,id:Date.now()});
    S.addSup=false;S.newSup={name:'',email:'',lead_days:'',lang:'SK'};
    S.alert={t:'ok',msg:`"${name}" uložený.`};render();
  });
  const csu=q('#cancel-sup');if(csu)csu.addEventListener('click',()=>{S.addSup=false;render();});
  qa('[data-delsup]').forEach(el=>el.addEventListener('click',async()=>{
    const id=+el.dataset.delsup;if(!confirm('Odstrániť?'))return;
    await dbDeleteSupplier(id);S.suppliers=S.suppliers.filter(s=>s.id!==id);render();
  }));
  qa('[data-editlead]').forEach(el=>el.addEventListener('click',()=>{
    const id=+el.dataset.editlead;S.editLeadId=id;
    const s=S.suppliers.find(x=>x.id===id);S.editLeadVal=s?s.lead_days:14;render();
    setTimeout(()=>document.getElementById('lead-inp-'+id)?.focus(),50);
  }));
  qa('[data-savelead]').forEach(el=>el.addEventListener('click',async()=>{
    const id=+el.dataset.savelead,v=parseInt(document.getElementById('lead-inp-'+id)?.value)||14;
    const s=S.suppliers.find(x=>x.id===id);if(s)s.lead_days=v;
    await dbUpdateLeadDays(id,v);S.editLeadId=null;
    S.alert={t:'ok',msg:`${S.suppliers.find(x=>x.id===id)?.name}: ${v} dní`};render();
  }));
  qa('[data-cancellead]').forEach(el=>el.addEventListener('click',()=>{S.editLeadId=null;render();}));
  ['ns-name','ns-email','ns-lead'].forEach(id=>{const el=q('#'+id);if(el)el.addEventListener('input',e=>{const k=id.replace('ns-','');S.newSup[k]=e.target.value;});});
  const nl=q('#ns-lang');if(nl)nl.addEventListener('change',e=>{S.newSup.lang=e.target.value;});
}

async function init(){await dbLoad();render();}
init();
</script>
</body>
</html>
